<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>8 Наурыз · 9В</title>

<style>
body{
font-family: Arial, sans-serif;
background:#fff0f5;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:40px;
font-size:40px;
}

.container{
margin-top:40px;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

button:hover{
background:#ff1e4d;
}

.card{
margin:15px auto;
padding:20px;
width:260px;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

img{
width:200px;
border-radius:10px;
margin-top:10px;
}

.hidden{
display:none;
}

.heart{
position:fixed;
color:red;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<h1>Қымбатты қыздар, 8 Наурыз құтты болсын! 🌸</h1>

<p>9В сыныбы сіздерді шын жүректен құттықтайды!</p>

<button onclick="playMusic()">Музыка ▶</button>

<br><br>

<input id="name" placeholder="Атыңды жаз..." style="padding:10px;font-size:18px">

<br><br>

<button onclick="showGift()">Сыйлық ашу 🎁</button>

<div id="result" class="container"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const girls = {
"Safiya":{img:"img/safiya.jpeg",text:"Safiya, сен өте керемет адамсың! 🌸"},
"Ruani":{img:"img/ruani.jpeg",text:"Ruani, әрқашан күлімдеп жүр! 💐"},
"Nuray":{img:"img/nuray.jpeg",text:"Nuray, армандарың орындалсын! ✨"},
"Shyryn":{img:"img/shyryn.jpeg",text:"Shyryn, бақытты бол! 🌷"},
"Inkar K":{img:"img/inkar_k.jpeg",text:"Inkar, сен ерекше жансың! 💖"},
"Asem":{img:"img/asem.jpeg",text:"Asem, өмірің гүлдей жайнасын! 🌺"},
"Nazym":{img:"img/nazym.jpeg",text:"Nazym, әр күнің бақыт пен қуанышқа толы болсын! 💐"},
"Shugyla":{img:"img/shugyla.jpeg",text:"Shugyla, әр күнің қуанышқа толы болсын! 🌼"},
"Gulmayra Ibragimova":{img:"img/gulmayra.jpeg",text:"Гульмайра апай, 8 наурыз құтты болсын! Сізге зор денсаулық, бақыт және еңбегіңіздің жемісін көре беріңіз! 🌷"},
"Inkar T":{img:"img/inkar_t.jpeg",text:"Inkar, сені асыға күтеміз! 🌸"},
"AmankhanBoy":{img:"img/amankhan.jpeg",text:"OOOOOOOO май неймиз жалалалала оу элекомастурбатилалалалала люблютебяалалаллала"},
};

function playMusic(){
document.getElementById("music").play();
}

function showGift(){

const name=document.getElementById("name").value.trim();
const data=girls[name];

if(!data){
alert("Атыңды дұрыс жаз 🙂");
return;
}

document.getElementById("result").innerHTML=
`
<div class="card">
<h2>${name}</h2>
<img src="${data.img}">
<p>${data.text}</p>
</div>
`;

hearts();
}

function hearts(){
for(let i=0;i<20;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=3+Math.random()*4+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);
}
}

</script>

</body>
</html>
